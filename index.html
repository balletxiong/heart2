<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给你的一颗心</title>
  <style>
    :root{
      --bg1:#060611;
      --bg2:#130b22;
      --bg3:#2a0f2d;
      --pink:#ff4d8d;
      --pink2:#ff7ab6;
      --rose:#ffd6e8;
      --white:#fff7fb;
      --glass: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 15%, rgba(255,77,141,.18), transparent 24%),
        radial-gradient(circle at 82% 25%, rgba(122,92,255,.15), transparent 22%),
        radial-gradient(circle at 50% 88%, rgba(255,122,182,.10), transparent 28%),
        linear-gradient(160deg, var(--bg1), var(--bg2) 52%, var(--bg3));
      font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      color:var(--white);
    }

    #fx{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      padding:22px;
      box-sizing:border-box;
    }

    .card{
      width:min(92vw, 480px);
      padding:28px 20px 22px;
      border:1px solid var(--line);
      border-radius:30px;
      background:linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.05));
      backdrop-filter: blur(16px);
      box-shadow:
        0 24px 80px rgba(0,0,0,.40),
        inset 0 1px 0 rgba(255,255,255,.08);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(circle at top left, rgba(255,77,141,.18), transparent 30%),
        radial-gradient(circle at top right, rgba(122,92,255,.18), transparent 28%),
        radial-gradient(circle at bottom center, rgba(255,255,255,.08), transparent 36%);
      pointer-events:none;
    }

    .shine{
      position:absolute;
      inset:-20% -30%;
      background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,.12) 50%, transparent 60%);
      transform:translateX(-42%) rotate(8deg);
      animation:sweep 6s linear infinite;
      pointer-events:none;
    }

    .title{
      position:relative;
      margin:0 0 10px;
      font-size:clamp(24px, 5.6vw, 38px);
      font-weight:900;
      letter-spacing:.6px;
      text-shadow:0 0 28px rgba(255,77,141,.22);
    }

    .subtitle{
      position:relative;
      margin:0 auto 18px;
      min-height:3.8em;
      max-width: 24em;
      line-height:1.85;
      font-size:clamp(14px, 3.8vw, 17px);
      color:rgba(255,247,251,.88);
    }

    .scene{
      position:relative;
      width:250px;
      height:250px;
      margin:8px auto 12px;
      display:grid;
      place-items:center;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      cursor:pointer;
      perspective:900px;
    }

    .halo{
      position:absolute;
      width:165px;
      height:165px;
      border-radius:50%;
      border:1px solid rgba(255,122,182,.20);
      box-shadow:0 0 38px rgba(255,77,141,.16);
      animation:halo 2.8s ease-in-out infinite;
    }

    .halo::before,
    .halo::after{
      content:"";
      position:absolute;
      inset:-18px;
      border-radius:50%;
      border:1px dashed rgba(255,255,255,.10);
      animation:rotate 10s linear infinite;
    }

    .halo::after{
      inset:-34px;
      opacity:.65;
      animation-duration:14s;
      animation-direction:reverse;
    }

    .orbit{
      position:absolute;
      inset:0;
      border-radius:50%;
      border:1px dashed rgba(255,255,255,.12);
      animation:rotate 18s linear infinite;
    }

    .orbit.two{
      inset:18px;
      animation-direction:reverse;
      opacity:.8;
    }

    .heart{
      position:relative;
      width:112px;
      height:112px;
      transform:rotate(-45deg);
      background:linear-gradient(145deg, #ff8fc1, #ff2f78 56%, #ff66a1);
      box-shadow:
        0 0 18px rgba(255,77,141,.72),
        0 0 48px rgba(255,77,141,.34),
        0 0 92px rgba(255,77,141,.18);
      animation:beat 1.12s ease-in-out infinite;
      filter:saturate(1.15);
    }

    .heart::before,
    .heart::after{
      content:"";
      position:absolute;
      width:112px;
      height:112px;
      border-radius:50%;
      background:inherit;
    }

    .heart::before{ top:-56px; left:0; }
    .heart::after{ left:56px; top:0; }

    .heart-label{
      position:absolute;
      left:50%;
      top:50%;
      width:160px;
      transform:translate(-50%,-50%) rotate(45deg);
      z-index:2;
      pointer-events:none;
      text-align:center;
      font-weight:900;
      color:#fff;
      text-shadow:0 2px 16px rgba(0,0,0,.28);
    }

    .heart-label .small{
      display:block;
      font-size:12px;
      opacity:.92;
      letter-spacing:1.5px;
      margin-bottom:6px;
    }
    .heart-label .big{
      display:block;
      font-size:22px;
      letter-spacing:2px;
    }

    .floating{
      position:absolute;
      inset:0;
      pointer-events:none;
    }
    .floating span{
      position:absolute;
      left:50%;
      top:50%;
      font-size:18px;
      opacity:0;
      animation:floatUp 3.8s linear infinite;
      text-shadow:0 0 18px rgba(255,77,141,.35);
    }
    .floating span:nth-child(1){ animation-delay:.2s; transform:translate(-140px, 90px); }
    .floating span:nth-child(2){ animation-delay:1.1s; transform:translate(120px, 100px); }
    .floating span:nth-child(3){ animation-delay:2.0s; transform:translate(-70px, 130px); }
    .floating span:nth-child(4){ animation-delay:2.7s; transform:translate(90px, 130px); }
    .floating span:nth-child(5){ animation-delay:1.8s; transform:translate(-170px, 40px); }
    .floating span:nth-child(6){ animation-delay:3.0s; transform:translate(160px, 50px); }

    .cta-row{
      position:relative;
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:8px;
    }

    .cta, .music-btn, .choice-btn{
      border:none;
      border-radius:999px;
      color:#fff;
      font-weight:800;
      cursor:pointer;
      transition:transform .2s ease, filter .2s ease, opacity .2s ease;
    }

    .cta, .music-btn{
      padding:12px 18px;
      font-size:15px;
      background:linear-gradient(135deg, rgba(255,77,141,.96), rgba(122,92,255,.86));
      box-shadow:0 12px 30px rgba(255,77,141,.22);
    }

    .choice-btn{
      padding:11px 18px;
      font-size:15px;
      background:linear-gradient(135deg, rgba(255,77,141,.95), rgba(255,122,182,.90));
      box-shadow:0 10px 26px rgba(255,77,141,.18);
    }

    .music-btn{
      background:linear-gradient(135deg, rgba(255,255,255,.12), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.14);
      box-shadow:none;
    }

    .cta:hover,.music-btn:hover,.choice-btn:hover{
      transform:translateY(-1px) scale(1.02);
      filter:brightness(1.05);
    }
    .cta:active,.music-btn:active,.choice-btn:active{
      transform:translateY(1px) scale(.99);
    }

    .hint{
      position:relative;
      margin-top:14px;
      font-size:13px;
      color:rgba(255,255,255,.64);
      letter-spacing:.3px;
    }

    .reveal{
      position:fixed;
      inset:0;
      z-index:3;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at center, rgba(255,77,141,.18), rgba(7,7,17,.70) 48%, rgba(7,7,17,.93) 100%);
      opacity:0;
      pointer-events:none;
      transition:opacity .7s ease;
    }
    .reveal.show{
      opacity:1;
      pointer-events:auto;
    }

    .reveal-box{
      width:min(90vw, 560px);
      padding:30px 22px 24px;
      text-align:center;
      border-radius:30px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.07);
      backdrop-filter: blur(18px);
      box-shadow:0 28px 90px rgba(0,0,0,.50);
    }

    .reveal-big{
      margin:0 0 12px;
      font-size:clamp(30px, 6vw, 46px);
      font-weight:900;
      letter-spacing:1px;
      text-shadow:0 0 28px rgba(255,77,141,.28);
    }

    .reveal-msg{
      margin:0 auto;
      max-width: 24em;
      line-height:1.95;
      font-size:clamp(15px, 3.8vw, 18px);
      color:rgba(255,247,251,.92);
    }

    .reveal-note{
      margin-top:18px;
      font-size:13px;
      color:rgba(255,255,255,.64);
    }

    .pulse-ring{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      border:2px solid rgba(255,122,182,.95);
      box-shadow:0 0 20px rgba(255,122,182,.7);
      animation:ring 1s ease-out forwards;
      pointer-events:none;
    }

    .burst-heart{
      position:fixed;
      z-index:4;
      pointer-events:none;
      transform:translate(-50%,-50%);
      text-shadow:0 0 16px rgba(255,122,182,.85);
    }

    .choice-panel{
      position:relative;
      display:none;
      gap:10px;
      justify-content:center;
      margin-top:14px;
      flex-wrap:wrap;
    }
    .choice-panel.show{ display:flex; }

    .fade-in{
      animation:fadeIn .7s ease both;
    }

    .top-right{
      position:absolute;
      top:14px;
      right:14px;
      z-index:2;
    }

    .music-status{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      font-size:12px;
      color:rgba(255,255,255,.86);
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
      user-select:none;
    }

    .dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#ff7ab6;
      box-shadow:0 0 10px rgba(255,122,182,.9);
    }

    @keyframes beat{
      0%,100%{ transform:rotate(-45deg) scale(1); }
      22%{ transform:rotate(-45deg) scale(1.08); }
      40%{ transform:rotate(-45deg) scale(.98); }
      60%{ transform:rotate(-45deg) scale(1.16); }
    }
    @keyframes halo{
      0%,100%{ transform:scale(.96); opacity:.55; }
      50%{ transform:scale(1.06); opacity:1; }
    }
    @keyframes rotate{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }
    @keyframes floatUp{
      0%{ opacity:0; transform:translate(-50%,-50%) translateY(24px) scale(.85); }
      15%{ opacity:.9; }
      100%{ opacity:0; transform:translate(-50%,-50%) translateY(-210px) scale(1.15); }
    }
    @keyframes sweep{
      0%{ transform:translateX(-45%) rotate(8deg); }
      100%{ transform:translateX(45%) rotate(8deg); }
    }
    @keyframes ring{
      0%{ transform:translate(-50%,-50%) scale(.2); opacity:.95; }
      100%{ transform:translate(-50%,-50%) scale(22); opacity:0; }
    }
    @keyframes fadeIn{
      from{ opacity:0; transform:translateY(10px); }
      to{ opacity:1; transform:translateY(0); }
    }

    @media (max-width: 420px){
      .card{ padding:24px 14px 20px; border-radius:24px; }
      .scene{ width:220px; height:220px; }
      .heart{ width:98px; height:98px; }
      .heart::before,.heart::after{ width:98px; height:98px; }
      .heart::before{ top:-49px; }
      .heart::after{ left:49px; }
    }
  </style>
</head>
<body>
<canvas id="fx"></canvas>

<div class="wrap">
  <div class="card">
    <div class="shine"></div>
    <div class="top-right">
      <div class="music-status" id="musicStatus"><span class="dot"></span><span id="musicText">音乐未开启</span></div>
    </div>

    <div class="title" id="title">今晚，把宇宙借给你</div>
    <div class="subtitle" id="subtitle">点一下中间那颗心，看看它会不会越来越偏向你。</div>

    <div class="scene" id="scene" aria-label="爱心互动区域">
      <div class="halo"></div>
      <div class="orbit"></div>
      <div class="orbit two"></div>

      <div class="floating" aria-hidden="true">
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
      </div>

      <div class="heart" id="heart">
        <div class="heart-label">
          <span class="small">CLICK</span>
          <span class="big">LOVE</span>
        </div>
      </div>
    </div>

    <div class="cta-row">
      <button class="cta" id="cta">点亮这颗心</button>
      <button class="music-btn" id="musicBtn">打开甜甜的音乐</button>
    </div>

    <div class="choice-panel" id="choicePanel">
      <button class="choice-btn" id="yesBtn">愿意</button>
      <button class="choice-btn" id="noBtn">让我再说一句</button>
    </div>

    <div class="hint" id="hint">每点一次，告白就会更认真一点。</div>
  </div>
</div>

<div class="reveal" id="reveal">
  <div class="reveal-box">
    <div class="reveal-big" id="revealBig">是你呀</div>
    <p class="reveal-msg" id="revealMsg">本来只是想做个网页，后来发现，所有好看的光，最后都该落到你身上。</p>
    <div class="reveal-note" id="revealNote">再点一次，故事会走到最后一页。</div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');

  const scene = document.getElementById('scene');
  const heart = document.getElementById('heart');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const cta = document.getElementById('cta');
  const hint = document.getElementById('hint');
  const reveal = document.getElementById('reveal');
  const revealBig = document.getElementById('revealBig');
  const revealMsg = document.getElementById('revealMsg');
  const revealNote = document.getElementById('revealNote');
  const musicBtn = document.getElementById('musicBtn');
  const musicText = document.getElementById('musicText');
  const choicePanel = document.getElementById('choicePanel');
  const yesBtn = document.getElementById('yesBtn');
  const noBtn = document.getElementById('noBtn');

  let W = 0, H = 0, dpr = 1;
  let stars = [];
  let sparks = [];
  let stage = 0;
  let audioOn = false;
  let audioCtx = null;
  let masterGain = null;
  let musicTimer = null;
  let noteIndex = 0;

  const stageData = [
    {
      title: "今晚，把宇宙借给你",
      subtitle: "点一下中间那颗心，看看它会不会越来越偏向你。",
      btn: "点亮这颗心",
      hint: "每点一次，告白就会更认真一点。",
      big: "是你呀",
      msg: "本来只是想做个网页，后来发现，所有好看的光，最后都该落到你身上。",
      note: "再点一次，故事会走到最后一页。"
    },
    {
      title: "你一出现，背景就该换颜色",
      subtitle: "我本来想装作不在意，结果连星星都在替我心动。",
      btn: "再给你看一层",
      hint: "这一层开始，话就不太客气了。",
      big: "我认真了",
      msg: "你不需要刻意靠近我，因为我早就开始，一点一点朝你这边偏了。",
      note: "还有最后一步。"
    },
    {
      title: "最后一层，只给你看",
      subtitle: "我已经把最直接的话，留在后面了。",
      btn: "把答案递给你",
      hint: "现在轮到你决定要不要接住。",
      big: "你愿意吗？",
      msg: "如果我把喜欢说得再直白一点——你愿意接受我的爱吗？",
      note: "点‘愿意’，会出现更甜的结局。"
    }
  ];

  function resize() {
    dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    W = canvas.width = Math.floor(innerWidth * dpr);
    H = canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';

    stars = Array.from({ length: Math.floor((innerWidth * innerHeight) / 9000) + 70 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: (Math.random() * 1.6 + 0.4) * dpr,
      a: Math.random(),
      v: (Math.random() * 0.35 + 0.08) * dpr,
      hue: 325 + Math.random() * 40
    }));
  }

  window.addEventListener('resize', resize, { passive: true });
  resize();

  function burst(x, y) {
    const count = 92;
    const cx = x * dpr;
    const cy = y * dpr;

    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    ring.style.left = x + 'px';
    ring.style.top = y + 'px';
    scene.appendChild(ring);
    setTimeout(() => ring.remove(), 1000);

    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.22;
      const speed = 2.6 + Math.random() * 6.8;
      const size = 1.5 + Math.random() * 2.8;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * speed * dpr,
        vy: Math.sin(angle) * speed * dpr,
        life: 72 + Math.random() * 28,
        max: 72 + Math.random() * 28,
        size,
        hue: 330 + Math.random() * 38
      });
    }
  }

  function addHeartBurst(x, y) {
    const wrapper = document.createElement('div');
    wrapper.style.position = 'fixed';
    wrapper.style.left = x + 'px';
    wrapper.style.top = y + 'px';
    wrapper.style.zIndex = '4';
    wrapper.style.pointerEvents = 'none';
    document.body.appendChild(wrapper);

    const count = 10;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'burst-heart';
      el.textContent = '❤';
      el.style.fontSize = (16 + Math.random() * 18) + 'px';
      el.style.color = `hsl(${330 + Math.random()*20} 100% 75%)`;
      wrapper.appendChild(el);

      const dx = (Math.random() * 2 - 1) * 170;
      const dy = -80 - Math.random() * 220;
      const rot = (Math.random() * 2 - 1) * 180;
      const dur = 900 + Math.random() * 700;

      el.animate([
        { transform: 'translate(-50%,-50%) scale(.75) rotate(0deg)', opacity: 0 },
        { offset: 0.12, transform: 'translate(-50%,-50%) scale(1.12) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) scale(.3) rotate(${rot}deg)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(.2,.8,.2,1)', fill: 'forwards' });
    }

    setTimeout(() => wrapper.remove(), 1800);
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);
    const time = t * 0.001;
    const cx = W * 0.5;
    const cy = H * 0.46;

    for (const s of stars) {
      s.a += Math.sin(time * 1.7 + s.x * 0.001) * 0.015;
      const alpha = 0.25 + Math.sin(time * 1.2 + s.x * 0.003 + s.y * 0.004) * 0.18 + s.a * 0.15;
      ctx.beginPath();
      ctx.fillStyle = `hsla(${s.hue}, 100%, 78%, ${Math.max(0.08, alpha)})`;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }

    for (let i = 0; i < stars.length; i++) {
      const a = stars[i];
      for (let j = i + 1; j < Math.min(i + 8, stars.length); j++) {
        const b = stars[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 170 * dpr) {
          const op = (1 - dist / (170 * dpr)) * 0.11;
          ctx.strokeStyle = `rgba(255, 180, 220, ${op})`;
          ctx.lineWidth = 1 * dpr;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    const g = ctx.createRadialGradient(cx, cy, 10 * dpr, cx, cy, 210 * dpr);
    g.addColorStop(0, 'rgba(255,77,141,.24)');
    g.addColorStop(.35, 'rgba(255,77,141,.12)');
    g.addColorStop(1, 'rgba(255,77,141,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, 210 * dpr, 0, Math.PI * 2);
    ctx.fill();

    for (let i = sparks.length - 1; i >= 0; i--) {
      const p = sparks[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.985;
      p.vy *= 0.985;
      p.vy += 0.03 * dpr;
      p.life -= 1;

      const alpha = Math.max(0, p.life / p.max);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsla(${p.hue}, 100%, 72%, ${alpha})`;
      ctx.shadowColor = `hsla(${p.hue}, 100%, 70%, ${alpha})`;
      ctx.shadowBlur = 12 * dpr;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * dpr, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      if (p.life <= 0) sparks.splice(i, 1);
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);

  function setStage(next) {
    stage = Math.min(next, stageData.length - 1);
    const d = stageData[stage];
    title.textContent = d.title;
    subtitle.textContent = d.subtitle;
    cta.textContent = d.btn;
    hint.textContent = d.hint;
    revealBig.textContent = d.big;
    revealMsg.textContent = d.msg;
    revealNote.textContent = d.note;
  }

  function flashReveal(duration=1600) {
    reveal.classList.add('show');
    setTimeout(() => reveal.classList.remove('show'), duration);
  }

  function handleAction() {
    const rect = scene.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;

    burst(x, y);
    addHeartBurst(x, y);

    heart.style.animation = 'none';
    void heart.offsetWidth;
    heart.style.animation = '';

    if (stage < 2) {
      setStage(stage + 1);
      flashReveal(1550);
      if (stage === 2) choicePanel.classList.add('show');
    } else {
      flashReveal(2200);
      choicePanel.classList.add('show');
    }

    startMusic();
  }

  scene.addEventListener('click', handleAction);
  cta.addEventListener('click', handleAction);

  yesBtn.addEventListener('click', () => {
    const rect = scene.getBoundingClientRect();
    burst(rect.left + rect.width / 2, rect.top + rect.height / 2);
    addHeartBurst(rect.left + rect.width / 2, rect.top + rect.height / 2);

    revealBig.textContent = "那就别反悔";
    revealMsg.textContent = "从你点下“愿意”的那一刻开始，这颗心就正式归你了。";
    revealNote.textContent = "以后我的温柔、偏心和认真，都是你的。";
    flashReveal(2600);
    startMusic(true);
  });

  noBtn.addEventListener('click', () => {
    revealBig.textContent = "那我再追一次";
    revealMsg.textContent = "没关系，我可以把刚才那句再说一遍，直到你愿意听到心动。";
    revealNote.textContent = "别急，我最擅长的，就是把不确定变成你点头。";
    flashReveal(2200);
    startMusic();
  });

  musicBtn.addEventListener('click', () => {
    if (!audioOn) {
      startMusic(true);
    } else {
      stopMusic();
    }
  });

  function ensureAudio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.08;
      masterGain.connect(audioCtx.destination);
    }
  }

  function playTone(freq, start, dur, type='sine', vol=0.18) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, start);

    gain.gain.setValueAtTime(0.0001, start);
    gain.gain.exponentialRampToValueAtTime(vol, start + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.0001, start + dur);

    osc.connect(gain);
    gain.connect(masterGain);

    osc.start(start);
    osc.stop(start + dur + 0.05);
  }

  function startMusic(force=false) {
    ensureAudio();

    if (audioCtx.state === 'suspended') audioCtx.resume();

    if (audioOn && !force) return;

    if (musicTimer) clearInterval(musicTimer);
    audioOn = true;
    musicText.textContent = "音乐播放中";
    musicBtn.textContent = "关闭甜甜的音乐";

    const bpm = 92;
    const beat = 60 / bpm;
    const scale = [261.63, 293.66, 329.63, 392.00, 440.00, 523.25]; // C D E G A C
    const melody = [
      [4,1],[3,1],[2,1],[3,1],
      [4,1],[5,1],[4,1],[3,1],
      [2,1],[1,1],[2,1],[3,1],
      [4,1],[3,1],[2,1],[1,1],
      [0,2],[2,2],[3,2],[4,2],
      [3,1],[2,1],[1,2],[0,2]
    ];

    let step = 0;
    const schedule = () => {
      const now = audioCtx.currentTime + 0.04;
      const pattern = melody[step % melody.length];
      const idx = pattern[0];
      const len = pattern[1] * beat;

      const f = scale[Math.max(0, Math.min(idx, scale.length - 1))];
      playTone(f, now, len * 0.92, 'sine', 0.18);
      playTone(f * 2, now, len * 0.46, 'triangle', 0.05);

      // 柔和和声
      if (step % 4 === 0) {
        playTone(196.00, now, len * 1.15, 'sine', 0.05);
      }
      if (step % 8 === 4) {
        playTone(293.66, now, len * 1.15, 'sine', 0.04);
      }
      step++;
    };

    schedule();
    musicTimer = setInterval(schedule, beat * 1000);
  }

  function stopMusic() {
    audioOn = false;
    musicText.textContent = "音乐未开启";
    musicBtn.textContent = "打开甜甜的音乐";
    if (musicTimer) clearInterval(musicTimer);
    musicTimer = null;
  }

  // 轻微自动漂浮心
  setInterval(() => {
    const rect = scene.getBoundingClientRect();
    const x = rect.left + rect.width / 2 + (Math.random() * 140 - 70);
    const y = rect.top + rect.height / 2 + (Math.random() * 100 - 50);
    addHeartBurst(x, y);
  }, 2200);

  // 首次点击页面任意位置，也能启动音乐
  document.body.addEventListener('pointerdown', () => {
    if (!audioOn) startMusic();
  }, { once: true });
})();
</script>
</body>
