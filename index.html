<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给你的一颗心</title>
  <style>
    :root{
      --bg1:#070711;
      --bg2:#160b22;
      --bg3:#2b0f2f;
      --pink:#ff4d8d;
      --pink2:#ff7ab6;
      --rose:#ffd1e6;
      --text:#fff5fa;
      --glass: rgba(255,255,255,.08);
      --line: rgba(255,255,255,.16);
    }

    html,body{
      margin:0;
      width:100%;
      height:100%;
      overflow:hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,77,141,.18), transparent 28%),
        radial-gradient(circle at 80% 30%, rgba(122,92,255,.16), transparent 24%),
        radial-gradient(circle at 50% 90%, rgba(255,122,182,.12), transparent 30%),
        linear-gradient(160deg, var(--bg1), var(--bg2) 52%, var(--bg3));
      font-family: "PingFang SC","Microsoft YaHei",system-ui,sans-serif;
      color:var(--text);
    }

    #fx{
      position:fixed;
      inset:0;
      width:100%;
      height:100%;
      display:block;
      z-index:0;
    }

    .wrap{
      position:relative;
      z-index:2;
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
      padding:24px;
      box-sizing:border-box;
    }

    .card{
      width:min(92vw, 460px);
      padding:28px 22px 24px;
      border:1px solid var(--line);
      border-radius:28px;
      background:linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.05));
      backdrop-filter: blur(14px);
      box-shadow:
        0 20px 70px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.08);
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(circle at top left, rgba(255,77,141,.22), transparent 30%),
        radial-gradient(circle at top right, rgba(122,92,255,.18), transparent 26%),
        radial-gradient(circle at bottom center, rgba(255,255,255,.08), transparent 35%);
      pointer-events:none;
      filter: blur(2px);
    }

    .title{
      position:relative;
      font-size:clamp(24px, 5vw, 36px);
      line-height:1.15;
      margin:2px 0 10px;
      font-weight:800;
      letter-spacing:.5px;
      text-shadow:0 0 24px rgba(255,77,141,.25);
    }

    .subtitle{
      position:relative;
      font-size:clamp(14px, 3.6vw, 17px);
      line-height:1.8;
      color:rgba(255,245,250,.86);
      min-height:3.6em;
      margin:0 auto 20px;
      max-width: 24em;
    }

    .hint{
      position:relative;
      font-size:13px;
      color:rgba(255,255,255,.62);
      margin-top:16px;
      letter-spacing:.4px;
    }

    .scene{
      position:relative;
      width:240px;
      height:240px;
      margin:8px auto 10px;
      display:grid;
      place-items:center;
      perspective:900px;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      cursor:pointer;
    }

    .halo{
      position:absolute;
      width:160px;
      height:160px;
      border-radius:50%;
      border:1px solid rgba(255,122,182,.22);
      box-shadow:0 0 35px rgba(255,77,141,.16);
      animation: halo 2.8s ease-in-out infinite;
    }
    .halo::before,
    .halo::after{
      content:"";
      position:absolute;
      inset:-18px;
      border-radius:50%;
      border:1px solid rgba(255,255,255,.10);
      animation: rotate 10s linear infinite;
    }
    .halo::after{
      inset:-34px;
      animation-duration:14s;
      opacity:.65;
    }

    .heart{
      position:relative;
      width:112px;
      height:112px;
      transform:rotate(-45deg);
      background:linear-gradient(145deg, #ff86ba, #ff2f78 55%, #ff66a1);
      box-shadow:
        0 0 18px rgba(255,77,141,.7),
        0 0 50px rgba(255,77,141,.35),
        0 0 90px rgba(255,77,141,.20);
      animation: beat 1.15s ease-in-out infinite;
      filter:saturate(1.15);
    }

    .heart::before,
    .heart::after{
      content:"";
      position:absolute;
      width:112px;
      height:112px;
      border-radius:50%;
      background:inherit;
    }

    .heart::before{ top:-56px; left:0; }
    .heart::after{ left:56px; top:0; }

    .heart-label{
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) rotate(45deg);
      z-index:2;
      text-align:center;
      width:160px;
      pointer-events:none;
      font-weight:800;
      color:#fff;
      text-shadow:0 2px 14px rgba(0,0,0,.28);
    }

    .heart-label .small{
      display:block;
      font-size:12px;
      opacity:.92;
      letter-spacing:1.4px;
      margin-bottom:6px;
    }
    .heart-label .big{
      display:block;
      font-size:22px;
      letter-spacing:2px;
    }

    .orbit{
      position:absolute;
      inset:0;
      border-radius:50%;
      border:1px dashed rgba(255,255,255,.12);
      animation: rotate 18s linear infinite;
    }
    .orbit.two{ inset:18px; animation-direction:reverse; opacity:.8; }

    .floating{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .floating span{
      position:absolute;
      left:50%;
      top:50%;
      font-size:18px;
      opacity:0;
      animation: floatUp 3.8s linear infinite;
      text-shadow:0 0 18px rgba(255,77,141,.35);
    }

    .floating span:nth-child(1){ animation-delay:.2s; transform:translate(-140px, 90px); }
    .floating span:nth-child(2){ animation-delay:1.1s; transform:translate(120px, 100px); }
    .floating span:nth-child(3){ animation-delay:2.0s; transform:translate(-70px, 130px); }
    .floating span:nth-child(4){ animation-delay:2.7s; transform:translate(90px, 130px); }
    .floating span:nth-child(5){ animation-delay:1.8s; transform:translate(-170px, 40px); }
    .floating span:nth-child(6){ animation-delay:3.0s; transform:translate(160px, 50px); }

    .burst{
      position:absolute;
      left:50%;
      top:50%;
      width:4px;
      height:4px;
      border-radius:50%;
      pointer-events:none;
      background:transparent;
      transform:translate(-50%,-50%);
    }

    .burst i{
      position:absolute;
      left:0;
      top:0;
      width:6px;
      height:6px;
      border-radius:50%;
      background:var(--pink2);
      box-shadow:0 0 12px rgba(255,122,182,.9);
      transform:translate(0,0) scale(1);
      animation: shoot 900ms ease-out forwards;
    }

    .cta{
      position:relative;
      display:inline-flex;
      align-items:center;
      gap:10px;
      margin-top:8px;
      padding:12px 18px;
      border:none;
      border-radius:999px;
      color:#fff;
      background:linear-gradient(135deg, rgba(255,77,141,.95), rgba(122,92,255,.85));
      box-shadow:0 12px 30px rgba(255,77,141,.24);
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:transform .2s ease, filter .2s ease;
    }
    .cta:hover{ transform:translateY(-1px) scale(1.02); filter:brightness(1.05); }
    .cta:active{ transform:translateY(1px) scale(.99); }

    .reveal{
      position:fixed;
      inset:0;
      z-index:3;
      display:grid;
      place-items:center;
      background:
        radial-gradient(circle at center, rgba(255,77,141,.18), rgba(7,7,17,.72) 48%, rgba(7,7,17,.92) 100%);
      opacity:0;
      pointer-events:none;
      transition:opacity .7s ease;
    }

    .reveal.show{
      opacity:1;
      pointer-events:auto;
    }

    .reveal-box{
      width:min(90vw, 560px);
      padding:28px 22px;
      text-align:center;
      border-radius:30px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.07);
      backdrop-filter: blur(18px);
      box-shadow:0 25px 80px rgba(0,0,0,.48);
    }

    .reveal-big{
      margin:0 0 10px;
      font-size:clamp(28px, 6vw, 44px);
      font-weight:900;
      letter-spacing:1px;
      text-shadow:0 0 28px rgba(255,77,141,.28);
    }

    .reveal-msg{
      margin:0 auto;
      max-width: 24em;
      line-height:1.9;
      font-size:clamp(15px, 3.8vw, 18px);
      color:rgba(255,245,250,.92);
    }

    .reveal-note{
      margin-top:18px;
      font-size:13px;
      color:rgba(255,255,255,.64);
    }

    .shine{
      position:absolute;
      inset:-20% -30%;
      background:linear-gradient(115deg, transparent 40%, rgba(255,255,255,.10) 50%, transparent 60%);
      transform:translateX(-40%) rotate(8deg);
      animation: sweep 6s linear infinite;
      pointer-events:none;
    }

    @keyframes beat{
      0%,100%{ transform:rotate(-45deg) scale(1); }
      22%{ transform:rotate(-45deg) scale(1.08); }
      40%{ transform:rotate(-45deg) scale(.98); }
      60%{ transform:rotate(-45deg) scale(1.16); }
    }
    @keyframes halo{
      0%,100%{ transform:scale(.96); opacity:.55; }
      50%{ transform:scale(1.06); opacity:1; }
    }
    @keyframes rotate{
      from{ transform:rotate(0deg); }
      to{ transform:rotate(360deg); }
    }
    @keyframes floatUp{
      0%{ opacity:0; transform:translate(-50%,-50%) translateY(24px) scale(.85); }
      15%{ opacity:.9; }
      100%{ opacity:0; transform:translate(-50%,-50%) translateY(-210px) scale(1.15); }
    }
    @keyframes sweep{
      0%{ transform:translateX(-45%) rotate(8deg); }
      100%{ transform:translateX(45%) rotate(8deg); }
    }
    @keyframes shoot{
      0%{ opacity:1; transform:translate(0,0) scale(1); }
      100%{ opacity:0; transform:translate(var(--dx), var(--dy)) scale(.2); }
    }

    .pulse-ring{
      position:absolute;
      width:8px;
      height:8px;
      border-radius:50%;
      border:2px solid rgba(255,122,182,.9);
      box-shadow:0 0 20px rgba(255,122,182,.7);
      animation:ring 1s ease-out forwards;
      pointer-events:none;
    }

    @keyframes ring{
      0%{ transform:translate(-50%,-50%) scale(.2); opacity:.95; }
      100%{ transform:translate(-50%,-50%) scale(22); opacity:0; }
    }

    @media (max-width: 420px){
      .card{ padding:24px 16px 20px; border-radius:24px; }
      .scene{ width:220px; height:220px; }
      .heart{ width:98px; height:98px; }
      .heart::before,.heart::after{ width:98px; height:98px; }
      .heart::before{ top:-49px; }
      .heart::after{ left:49px; }
    }
  </style>
</head>
<body>
<canvas id="fx"></canvas>

<div class="wrap">
  <div class="card">
    <div class="shine"></div>
    <div class="title" id="title">今晚，把宇宙借给你</div>
    <div class="subtitle" id="subtitle">点一下中间那颗心，看看会发生什么。</div>

    <div class="scene" id="scene" aria-label="爱心互动区域">
      <div class="halo"></div>
      <div class="orbit"></div>
      <div class="orbit two"></div>

      <div class="floating" aria-hidden="true">
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
        <span>✦</span>
      </div>

      <div class="heart" id="heart">
        <div class="heart-label">
          <span class="small">CLICK</span>
          <span class="big">LOVE</span>
        </div>
      </div>
    </div>

    <button class="cta" id="cta">点亮这颗心</button>
    <div class="hint">建议用手机打开，效果更好。</div>
  </div>
</div>

<div class="reveal" id="reveal">
  <div class="reveal-box">
    <div class="reveal-big" id="revealBig">是你呀</div>
    <p class="reveal-msg" id="revealMsg">本来只是想做个网页，后来发现，所有好看的光，最后都该落到你身上。</p>
    <div class="reveal-note">再点一次，给你更狠的版本。</div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('fx');
  const ctx = canvas.getContext('2d');
  const scene = document.getElementById('scene');
  const heart = document.getElementById('heart');
  const title = document.getElementById('title');
  const subtitle = document.getElementById('subtitle');
  const cta = document.getElementById('cta');
  const reveal = document.getElementById('reveal');
  const revealBig = document.getElementById('revealBig');
  const revealMsg = document.getElementById('revealMsg');

  let W = 0, H = 0, dpr = 1;
  let stars = [];
  let particles = [];
  let sparks = [];
  let stage = 0;
  let lastTime = 0;

  const stageData = [
    {
      title: "今晚，把宇宙借给你",
      subtitle: "点一下中间那颗心，看看会发生什么。",
      btn: "点亮这颗心",
      big: "是你呀",
      msg: "本来只是想做个网页，后来发现，所有好看的光，最后都该落到你身上。"
    },
    {
      title: "你一出现，背景就该换颜色",
      subtitle: "再点一次，会出现更明显的告白。",
      btn: "再来一次",
      big: "我认真了",
      msg: "如果心动有声音，那刚才这一秒，应该已经足够吵到你听见了。"
    },
    {
      title: "最后一层：只给你看",
      subtitle: "这次不是特效，是心意。",
      btn: "再点一次",
      big: "送给你",
      msg: "如果你愿意，我想把今天、明天、以及以后所有能发光的部分，都留给你。"
    }
  ];

  function resize() {
    dpr = Math.max(1, Math.min(window.devicePixelRatio || 1, 2));
    W = canvas.width = Math.floor(innerWidth * dpr);
    H = canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';

    stars = Array.from({ length: Math.floor((innerWidth * innerHeight) / 9000) + 70 }, () => ({
      x: Math.random() * W,
      y: Math.random() * H,
      r: (Math.random() * 1.6 + 0.4) * dpr,
      a: Math.random(),
      v: (Math.random() * 0.35 + 0.08) * dpr,
      hue: 325 + Math.random() * 40
    }));
  }

  window.addEventListener('resize', resize, { passive: true });
  resize();

  function burst(x, y) {
    const count = 90;
    const rect = canvas.getBoundingClientRect();
    const cx = x * dpr;
    const cy = y * dpr;

    const ring = document.createElement('div');
    ring.className = 'pulse-ring';
    ring.style.left = x + 'px';
    ring.style.top = y + 'px';
    scene.appendChild(ring);
    setTimeout(() => ring.remove(), 1000);

    for (let i = 0; i < count; i++) {
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.22;
      const speed = 2.5 + Math.random() * 6.5;
      const size = 1.5 + Math.random() * 2.8;
      sparks.push({
        x: cx,
        y: cy,
        vx: Math.cos(angle) * speed * dpr,
        vy: Math.sin(angle) * speed * dpr,
        life: 70 + Math.random() * 28,
        max: 70 + Math.random() * 28,
        size,
        hue: 330 + Math.random() * 38,
        alpha: 1
      });
    }
  }

  function addHeartBurst(x, y) {
    const baseX = x, baseY = y;
    const wrapper = document.createElement('div');
    wrapper.style.position = 'fixed';
    wrapper.style.left = baseX + 'px';
    wrapper.style.top = baseY + 'px';
    wrapper.style.zIndex = '4';
    wrapper.style.pointerEvents = 'none';
    document.body.appendChild(wrapper);

    const count = 10;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.textContent = '❤';
      el.style.position = 'absolute';
      el.style.left = '0';
      el.style.top = '0';
      el.style.fontSize = (16 + Math.random() * 18) + 'px';
      el.style.color = `hsl(${330 + Math.random()*20} 100% 75%)`;
      el.style.textShadow = '0 0 16px rgba(255,122,182,.85)';
      el.style.transform = 'translate(-50%,-50%)';
      wrapper.appendChild(el);

      const dx = (Math.random() * 2 - 1) * 170;
      const dy = -80 - Math.random() * 220;
      const rot = (Math.random() * 2 - 1) * 180;
      const dur = 900 + Math.random() * 700;
      el.animate([
        { transform: 'translate(-50%,-50%) scale(.75) rotate(0deg)', opacity: 0 },
        { offset: 0.12, transform: 'translate(-50%,-50%) scale(1.1) rotate(0deg)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) scale(.3) rotate(${rot}deg)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(.2,.8,.2,1)', fill: 'forwards' });
    }

    setTimeout(() => wrapper.remove(), 1800);
  }

  function draw(t) {
    ctx.clearRect(0, 0, W, H);

    const time = t * 0.001;
    const cx = W * 0.5;
    const cy = H * 0.46;

    // 星星背景
    for (const s of stars) {
      s.a += Math.sin(time * 1.7 + s.x * 0.001) * 0.015;
      const alpha = 0.25 + Math.sin(time * 1.2 + s.x * 0.003 + s.y * 0.004) * 0.18 + s.a * 0.15;
      ctx.beginPath();
      ctx.fillStyle = `hsla(${s.hue}, 100%, 78%, ${Math.max(0.08, alpha)})`;
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // 连接线
    for (let i = 0; i < stars.length; i++) {
      const a = stars[i];
      for (let j = i + 1; j < Math.min(i + 8, stars.length); j++) {
        const b = stars[j];
        const dx = a.x - b.x;
        const dy = a.y - b.y;
        const dist = Math.hypot(dx, dy);
        if (dist < 170 * dpr) {
          const op = (1 - dist / (170 * dpr)) * 0.11;
          ctx.strokeStyle = `rgba(255, 180, 220, ${op})`;
          ctx.lineWidth = 1 * dpr;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }

    // 中心光晕
    const g = ctx.createRadialGradient(cx, cy, 10 * dpr, cx, cy, 210 * dpr);
    g.addColorStop(0, 'rgba(255,77,141,.24)');
    g.addColorStop(.35, 'rgba(255,77,141,.12)');
    g.addColorStop(1, 'rgba(255,77,141,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(cx, cy, 210 * dpr, 0, Math.PI * 2);
    ctx.fill();

    // 爆发粒子
    for (let i = sparks.length - 1; i >= 0; i--) {
      const p = sparks[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.985;
      p.vy *= 0.985;
      p.vy += 0.03 * dpr;
      p.life -= 1;

      const alpha = Math.max(0, p.life / p.max);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = `hsla(${p.hue}, 100%, 72%, ${alpha})`;
      ctx.shadowColor = `hsla(${p.hue}, 100%, 70%, ${alpha})`;
      ctx.shadowBlur = 12 * dpr;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * dpr, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      if (p.life <= 0) sparks.splice(i, 1);
    }

    requestAnimationFrame(draw);
  }

  requestAnimationFrame(draw);

  function setStage(next) {
    stage = Math.min(next, stageData.length - 1);
    const d = stageData[stage];
    title.textContent = d.title;
    subtitle.textContent = d.subtitle;
    cta.textContent = d.btn;
    revealBig.textContent = d.big;
    revealMsg.textContent = d.msg;
  }

  function handleAction() {
    const rect = scene.getBoundingClientRect();
    const x = rect.left + rect.width / 2;
    const y = rect.top + rect.height / 2;

    burst(x, y);
    addHeartBurst(x, y);

    heart.style.animation = 'none';
    void heart.offsetWidth;
    heart.style.animation = '';

    if (stage < 2) {
      setStage(stage + 1);
      reveal.classList.add('show');
      setTimeout(() => reveal.classList.remove('show'), 1700);
    } else {
      reveal.classList.add('show');
      setTimeout(() => reveal.classList.remove('show'), 2400);
    }
  }

  scene.addEventListener('click', handleAction);
  cta.addEventListener('click', handleAction);

  // 初始一点微弱漂浮粒子感
  setInterval(() => {
    const rect = scene.getBoundingClientRect();
    const x = rect.left + rect.width / 2 + (Math.random() * 140 - 70);
    const y = rect.top + rect.height / 2 + (Math.random() * 100 - 50);
    addHeartBurst(x, y);
  }, 2200);
})();
</script>
</body>
</html>
